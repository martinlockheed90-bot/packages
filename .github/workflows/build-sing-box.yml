name: Build sing-box package
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo (with our Makefile changes)
        uses: actions/checkout@v4
        with:
          path: my-packages
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Download ImmortalWrt SDK
        run: |
          wget https://downloads.immortalwrt.org/releases/25.12.0/targets/bcm27xx/bcm2712/immortalwrt-sdk-25.12.0-bcm27xx-bcm2712_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf immortalwrt-sdk-25.12.0-bcm27xx-bcm2712_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mv immortalwrt-sdk-25.12.0-bcm27xx-bcm2712_gcc-14.3.0_musl.Linux-x86_64 sdk
      - name: Point packages feed at our fork
        run: |
          cd sdk
          sed -i 's#^src-git packages.*#src-git packages https://github.com/martinlockheed90-bot/packages.git#' feeds.conf.default
      - name: Update and install feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install sing-box
      - name: Configure build
        run: |
          cd sdk
          make defconfig
      - name: First build pass (to populate go module cache)
        run: |
          cd sdk
          make package/sing-box/compile V=s -j$(nproc) IGNORE_ERRORS="n m"
      - name: Patch sing library UDP ASSOCIATE IPv4 bug
        run: |
          cd sdk
          SING_SRC=$(find dl/go-mod-cache/github.com/sagernet -maxdepth 1 -iname "sing@*" -type d | head -1)
          echo "Found sing module at: $SING_SRC"
          if [ -z "$SING_SRC" ]; then
            echo "ERROR: sing module not found in go-mod-cache"
            exit 1
          fi
          rm -rf /tmp/sing-patched
          cp -r "$SING_SRC" /tmp/sing-patched
          chmod -R u+w /tmp/sing-patched
          python3 << 'PYEOF'
          path = "/tmp/sing-patched/protocol/socks/client.go"
          with open(path) as f:
              content = f.read()
          old_import = '\t"net/url"\n'
          new_import = '\t"log"\n\t"net/netip"\n\t"net/url"\n'
          assert old_import in content, "import anchor not found"
          content = content.replace(old_import, new_import, 1)
          old_line = '\t\tcommand = socks5.CommandUDPAssociate\n'
          new_line = (
              '\t\tcommand = socks5.CommandUDPAssociate\n'
              '\t\tif !address.IsValid() || (address.IsIPv6() && address.Addr.IsUnspecified()) {\n'
              '\t\t\tlog.Println("SINGBOX-UDP-PATCH-V2-TRIGGERED orig=" + address.String())\n'
              '\t\t\taddress = M.SocksaddrFrom(netip.IPv4Unspecified(), address.Port)\n'
              '\t\t}\n'
          )
          assert old_line in content, "command anchor not found"
          content = content.replace(old_line, new_line, 1)
          with open(path, 'w') as f:
              f.write(content)
          print("=== PATCH APPLIED SUCCESSFULLY ===")
          PYEOF
          echo "=== Verifying patched file ==="
          grep -n "IsValid\|IPv4Unspecified\|net/netip\|SINGBOX-UDP-PATCH-V2\|\"log\"" /tmp/sing-patched/protocol/socks/client.go
          PKG_BUILD_DIR=$(find build_dir -maxdepth 3 -type d -iname "sing-box-*" | head -1)
          echo "PKG_BUILD_DIR: $PKG_BUILD_DIR"
          if [ -z "$PKG_BUILD_DIR" ]; then
            echo "ERROR: sing-box build dir not found"
            exit 1
          fi
          echo "" >> "$PKG_BUILD_DIR/go.mod"
          echo "replace github.com/sagernet/sing => /tmp/sing-patched" >> "$PKG_BUILD_DIR/go.mod"
          echo "=== go.mod tail ==="
          tail -5 "$PKG_BUILD_DIR/go.mod"
      - name: Force clean before second build
        run: |
          cd sdk
          make package/sing-box/clean V=s
          find build_dir -maxdepth 3 -type d -iname "sing-box-*" -exec rm -rf {} + 2>/dev/null || true
          find bin/packages -iname "*sing-box*" -delete 2>/dev/null || true
      - name: Second build pass (with patch applied)
        run: |
